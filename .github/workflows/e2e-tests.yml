# 依赖: GitHub Actions, Python 3.11, uv, poethepoet / Deps: GitHub Actions, Python 3.11, uv, poethepoet
# 描述: E2E 测试工作流，安装依赖后运行 `poe test-e2e` / Description: E2E test workflow that installs deps then runs `poe test-e2e`

name: E2E Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Run end-to-end tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 uv / Install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 缓存虚拟环境 .venv / Cache project virtualenv .venv
      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-3.11-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}-v3
          restore-keys: |
            ${{ runner.os }}-venv-

      # 安装依赖 / Install dependencies
      - name: Install dependencies
        run: |
          uv --version
          uv sync --extra dev --extra test --extra cli

      # 运行 E2E 测试 / Run e2e tests
      - name: Run e2e tests
        run: |
          uv run poe test-e2e

