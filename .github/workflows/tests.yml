# 依赖: GitHub Actions, Python 3.11, uv, poethepoet / Deps: GitHub Actions, Python 3.11, uv, poethepoet
# 描述: 普通测试工作流，安装依赖后运行 `poe test` / Description: Regular test workflow that installs deps then runs `poe test`

name: Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run unit/integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 uv / Install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 缓存虚拟环境 .venv / Cache project virtualenv .venv
      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.setup-python.outputs.python-version || '3.11' }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}-v3
          restore-keys: |
            ${{ runner.os }}-venv-

      # 安装依赖（包含 dev、test、cli 组，确保 poethepoet 可用）
      # Install dependencies (include dev, test, cli groups to ensure poethepoet is available)
      - name: Install dependencies
        run: |
          uv --version
          uv sync --group dev --group test --extra cli

      # 运行测试（poe 在虚拟环境中调用）
      # Run tests through poe inside the venv
      - name: Run tests
        run: |
          uv run poe test

      # 可选：展示 pytest 缓存或覆盖率工件（如需可开启）
      # Optional: upload artifacts like coverage reports (uncomment if needed)
      # - name: Upload coverage report
